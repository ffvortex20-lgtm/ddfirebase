<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a0b2e; border: 2px solid #9d00ff; box-shadow: 0 0 20px #9d00ff; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input, select, button { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; }
        button { background: #9d00ff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px #ff00ff; }
        #status { margin-top: 20px; color: #00ffcc; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="card">
    <h2 style="color: #9d00ff; text-shadow: 0 0 10px #9d00ff;">Gerador DDVT Neon</h2>
    <input type="text" id="fbLink" placeholder="URL do Firebase">
    <input type="number" id="qtd" placeholder="Quantidade">
    <div style="display: flex; gap: 5px;">
        <input type="number" id="tempoVal" placeholder="Tempo">
        <select id="unidade">
            <option value="1">Milissegundos</option>
            <option value="1000">Segundos</option>
            <option value="60000">Minutos</option>
        </select>
    </div>
    <button onclick="gerar()">Gerar Usuários</button>
    <div id="status">Status: Aguardando...</div>
</div>

<script>
    async function gerar() {
        const url = document.getElementById('fbLink').value;
        const qtd = parseInt(document.getElementById('qtd').value);
        const tempo = parseInt(document.getElementById('tempoVal').value) * parseInt(document.getElementById('unidade').value);
        const status = document.getElementById('status');

        try {
            firebase.initializeApp({ databaseURL: url });
            const db = firebase.database();
            status.innerHTML = "Conectado ao: " + url.split('//')[1];
            
            for (let i = 0; i < qtd; i++) {
                await new Promise(resolve => setTimeout(resolve, tempo / qtd));
                const id = "DDVT-" + Math.floor(Math.random() * 99999);
                await db.ref('users/' + id).set({ login: id, expira: Date.now() + 86400000 });
                status.innerHTML = `Gerando ${i+1}/${qtd}: ${id}`;
            }
            status.innerHTML = "Concluído com sucesso!";
        } catch (e) {
            status.innerHTML = "Erro de conexão!";
        }
    }
</script>
</body>
</html>
