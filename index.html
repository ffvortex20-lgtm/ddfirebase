<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a0b2e; border: 2px solid #9d00ff; box-shadow: 0 0 20px #9d00ff; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input, button { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #9d00ff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.btn-apagar { background: #ff0044; }
        button:hover { box-shadow: 0 0 15px #ff00ff; }
        #status { margin-top: 20px; color: #00ffcc; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="card">
    <h2 style="color: #9d00ff; text-shadow: 0 0 10px #9d00ff;">Gerador DDVT</h2>
    <input type="text" id="fbLink" placeholder="URL do Firebase">
    <input type="number" id="qtd" placeholder="Quantidade">
    
    <button onclick="gerar()">Gerar Usuários</button>
    <button class="btn-apagar" onclick="apagarTudo()">Apagar Todos os Dados</button>
    
    <div id="status">Status: Aguardando...</div>
</div>

<script>
    function getDb() {
        const url = document.getElementById('fbLink').value;
        if (!firebase.apps.length) firebase.initializeApp({ databaseURL: url });
        return firebase.database();
    }

    async function gerar() {
        const qtd = parseInt(document.getElementById('qtd').value);
        const status = document.getElementById('status');
        const db = getDb();
        
        status.innerHTML = "Processando...";
        const promessas = [];
        for (let i = 0; i < qtd; i++) {
            const id = "DDVT-" + Math.floor(Math.random() * 99999);
            promessas.push(db.ref('users/' + id).set({ login: id, expira: Date.now() + 86400000 }));
        }
        await Promise.all(promessas);
        status.innerHTML = "Gerado com sucesso!";
    }

    async function apagarTudo() {
        if (!confirm("Tem certeza que deseja apagar TODOS os dados do banco?")) return;
        
        const status = document.getElementById('status');
        try {
            const db = getDb();
            status.innerHTML = "Limpando banco de dados...";
            await db.ref().remove();
            status.innerHTML = "Banco de dados limpo com sucesso!";
        } catch (e) {
            status.innerHTML = "Erro ao apagar dados!";
        }
    }
</script>
</body>
</html>
