<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a0b2e; border: 2px solid #9d00ff; box-shadow: 0 0 20px #9d00ff; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input, button { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #9d00ff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px #ff00ff; }
        #status { margin-top: 20px; color: #00ffcc; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="card">
    <h2 style="color: #9d00ff; text-shadow: 0 0 10px #9d00ff;">Gerador DDVT (Instantâneo)</h2>
    <input type="text" id="fbLink" placeholder="URL do Firebase">
    <input type="number" id="qtd" placeholder="Quantidade">
    <button onclick="gerar()">Gerar Todos de Uma Vez</button>
    <div id="status">Status: Aguardando...</div>
</div>

<script>
    async function gerar() {
        const url = document.getElementById('fbLink').value;
        const qtd = parseInt(document.getElementById('qtd').value);
        const status = document.getElementById('status');

        if (!url || isNaN(qtd) || qtd <= 0) {
            status.innerHTML = "Preencha os campos corretamente!";
            return;
        }

        try {
            // Evita reinicializar o Firebase se o usuário clicar duas vezes
            if (!firebase.apps.length) {
                firebase.initializeApp({ databaseURL: url });
            }
            const db = firebase.database();
            
            status.innerHTML = "Processando envios simultâneos...";
            
            // Cria um array para armazenar todas as requisições
            const promessas = [];
            
            for (let i = 0; i < qtd; i++) {
                const id = "DDVT-" + Math.floor(Math.random() * 99999);
                // Prepara a gravação mas não pausa o loop
                const envio = db.ref('users/' + id).set({ login: id, expira: Date.now() + 86400000 });
                promessas.push(envio);
            }
            
            // Aguarda o servidor confirmar que tudo foi gravado
            await Promise.all(promessas);
            status.innerHTML = `Concluído com sucesso! ${qtd} usuários gerados instantaneamente.`;
            
        } catch (e) {
            status.innerHTML = "Erro ao gravar dados!";
            console.error(e);
        }
    }
</script>
</body>
</html>
